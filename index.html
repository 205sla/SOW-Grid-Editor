<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SOW Grid Editor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }


body {
  background: #0f0f0f;
  color: #aaa;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

#top {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: #181818;
  border-bottom: 1px solid #222;
  flex-shrink: 0;
}

#palette {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  background: #141414;
  border-bottom: 1px solid #2a2a2a;
  flex-shrink: 0;
  flex-wrap: wrap;
}

.sep { width: 1px; height: 16px; background: #2a2a2a; margin: 0 2px; flex-shrink: 0; }
.lbl { color: #484848; font-size: 10px; }

input[type=number] {
  width: 48px;
  background: #1e1e1e;
  border: 1px solid #333;
  color: #bbb;
  padding: 2px 4px;
  font-family: inherit;
  font-size: 11px;
}

button {
  background: #1e1e1e;
  border: 1px solid #333;
  color: #888;
  padding: 2px 8px;
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
}
button:hover { background: #252525; color: #bbb; }
button.act { border-color: #555; color: #ccc; }
button.act.dirty { background: #fff; color: #000; border-color: #fff; }

.tile-btn {
  width: 58px;
  padding: 4px 0;
  text-align: center;
  font-size: 10px;
  border: 2px solid transparent;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.3px;
}
.tile-btn.sel { border-color: #fff !important; color: #fff !important; }
.tile-btn.sm { width: 26px; }

#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

#grid-wrap {
  flex: 1;
  overflow: auto;
  padding: 12px;
}

#grid-area {
  position: relative;
  display: inline-block;
}

#grid {
  display: grid;
  gap: 1px;
  background: #111;
  user-select: none;
  cursor: crosshair;
}

.cell {
  width: var(--cs);
  height: var(--cs);
  position: relative;
  flex-shrink: 0;
}
.cell:hover { filter: brightness(1.5); }
.cell.BLOCKED    { background: #1c1c1c; }
.cell.PATH       { background: #7a6540; }
.cell.SPAWN      { background: #8b2222; }
.cell.RUNE       { background: #2a228b; }
.cell.BLOCKED_L1   { background: #1a2535; }
.cell.BLOCKED_L1_M { background: #1a2535; box-shadow: inset 0 0 0 2px #4a80c0; }
.cell.BLOCKED_L2   { background: #152518; }
.cell.BLOCKED_L2_M { background: #152518; box-shadow: inset 0 0 0 2px #40a060; }
.cell.BLOCKED_L3   { background: #352015; }
.cell.BLOCKED_L3_M { background: #352015; box-shadow: inset 0 0 0 2px #c07040; }
.cell.BLOCKED_L4   { background: #28152a; }
.cell.BLOCKED_L4_M { background: #28152a; box-shadow: inset 0 0 0 2px #a040c0; }
.cell.BLOCKED_L5   { background: #153030; }
.cell.BLOCKED_L5_M { background: #153030; box-shadow: inset 0 0 0 2px #40b0b0; }
.cell.lbl::before {
  content: attr(data-xy);
  font-size: 7px;
  color: rgba(255,255,255,0.35);
  position: absolute;
  top: 1px; left: 1px;
  pointer-events: none;
  line-height: 1;
}
.cell.lbl:not(.SPAWN)::after {
  content: attr(data-tile);
  font-size: 6px;
  color: rgba(255,255,255,0.3);
  position: absolute;
  bottom: 1px; left: 1px; right: 1px;
  pointer-events: none;
  line-height: 1.2;
  white-space: pre;
}
.cell.SPAWN[data-num]::after {
  content: attr(data-num);
  font-size: 11px;
  font-weight: bold;
  color: rgba(255,255,255,0.9);
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

#route-svg {
  position: absolute;
  top: 0; left: 0;
  pointer-events: none;
}

#side {
  width: 220px;
  background: #131313;
  border-left: 1px solid #222;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

#tabs {
  display: flex;
  border-bottom: 1px solid #222;
}
.tab {
  flex: 1;
  padding: 5px 0;
  text-align: center;
  cursor: pointer;
  font-size: 11px;
  color: #555;
  border-bottom: 2px solid transparent;
}
.tab.on { color: #bbb; border-bottom-color: #555; }

#side-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.route-item { margin-bottom: 8px; }
.route-head {
  display: flex;
  align-items: center;
  gap: 5px;
}
.route-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 12px;
  padding: 0 2px;
  color: #555;
  line-height: 1;
}
.route-btn:hover { color: #bbb; }
.route-btn.locked { color: #e8a640; }
.route-btn.drawing { color: #4ae840; }
.cell.draw-highlight { outline: 2px solid #4ae840; outline-offset: -2px; z-index: 1; }
.cell.draw-start { outline: 2px solid #e8a640; outline-offset: -2px; z-index: 1; }
.route-btn.playing { color: #4ae8e8; }
.cell.anim-trail { outline: 2px solid rgba(255,255,255,0.25); outline-offset: -2px; z-index: 1; }
.cell.anim-head { outline: 3px solid #fff; outline-offset: -3px; z-index: 2; }
  margin-bottom: 3px;
  color: #777;
  font-size: 11px;
}
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.route-item textarea {
  width: 100%;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  color: #888;
  font-family: inherit;
  font-size: 9px;
  padding: 3px;
  resize: vertical;
  min-height: 52px;
}

.cm-row {
  display: flex;
  gap: 4px;
  margin-bottom: 5px;
  align-items: center;
}
.cm-key { width: 56px; flex-shrink: 0; font-size: 10px; }
.cm-inp {
  flex: 1;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  color: #777;
  font-family: inherit;
  font-size: 9px;
  padding: 2px 3px;
  min-width: 0;
}

.meta-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.meta-row label { color: #555; width: 78px; flex-shrink: 0; font-size: 11px; }
.meta-row input, .meta-row select {
  flex: 1;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  color: #bbb;
  padding: 2px 4px;
  font-family: inherit;
  font-size: 11px;
  min-width: 0;
}

#bar {
  padding: 2px 8px;
  background: #0c0c0c;
  border-top: 1px solid #1e1e1e;
  font-size: 10px;
  color: #444;
  flex-shrink: 0;
}

/* ── Map Modal ─────────────────────────────────────────────────────────── */
#map-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#map-modal.open { display: flex; }
#map-modal-box {
  background: #181818;
  border: 1px solid #333;
  width: 600px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  font-family: 'Courier New', monospace;
  font-size: 12px;
}
.mm-head {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  border-bottom: 1px solid #2a2a2a;
  color: #ccc;
  font-size: 13px;
  flex-shrink: 0;
}
.mm-bar {
  display: flex;
  gap: 6px;
  padding: 6px 10px;
  border-bottom: 1px solid #222;
  flex-shrink: 0;
}
#mm-list { flex: 1; overflow-y: auto; }
.mm-empty { padding: 20px; color: #444; text-align: center; }
.mm-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  border-bottom: 1px solid #1c1c1c;
}
.mm-row:hover { background: #1e1e1e; }
.mm-row.cur { background: #162016; }
.mm-mark { width: 14px; font-size: 10px; color: #5a5; flex-shrink: 0; }
.mm-name {
  flex: 1;
  background: transparent;
  border: 1px solid transparent;
  color: #bbb;
  font-family: inherit;
  font-size: 11px;
  padding: 1px 4px;
  min-width: 0;
}
.mm-name:focus { background: #222; border-color: #444; outline: none; }
.mm-info { color: #555; font-size: 10px; width: 60px; flex-shrink: 0; text-align: right; }
.mm-date { color: #444; font-size: 10px; width: 110px; flex-shrink: 0; text-align: right; }
.mm-acts { display: flex; gap: 3px; flex-shrink: 0; }
.mm-foot {
  padding: 6px 10px;
  border-top: 1px solid #2a2a2a;
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}
#map-indicator {
  font-size: 11px;
  color: #777;
  background: transparent;
  border: none;
  border-bottom: 1px solid transparent;
  width: 110px;
  padding: 1px 2px;
  font-family: inherit;
}
#map-indicator:hover { border-bottom-color: #333; }
#map-indicator:focus { outline: none; border-bottom-color: #555; color: #bbb; }
#map-indicator.dirty { color: #a77; }
</style>
</head>
<body>

<div id="top">
  <button class="act" onclick="openMapModal()">맵</button>
  <input id="map-indicator" type="text" title="클릭하여 이름 변경" onchange="renameCurrentMap(this.value)">
  <button onclick="saveCurrentMap()" title="현재 맵 저장">저장</button>

  <div class="sep"></div>
  <span class="lbl">Cell</span>
  <input type="number" id="ics" value="28" min="6" max="96" oninput="markApply()">
  <span class="lbl">W</span>
  <input type="number" id="iw" value="19" min="1" max="300" oninput="markApply()">
  <span class="lbl">H</span>
  <input type="number" id="ih" value="10" min="1" max="300" oninput="markApply()">
  <button id="apply-btn" class="act" onclick="applySize()">적용</button>

  <div class="sep" style="margin-left:auto"></div>
  <button onclick="clearGrid()">초기화</button>
  <button onclick="document.getElementById('fi').click()">.ini 불러오기</button>
  <input type="file" id="fi" accept=".ini" style="display:none" onchange="loadINI(event)">
  <button class="act" onclick="exportINI()">.ini 내보내기</button>
</div>

<div id="palette">
  <div id="tile-btns" style="display:contents"></div>
</div>

<div id="main">
  <div id="grid-wrap">
    <div id="grid-area">
      <div id="grid"></div>
      <svg id="route-svg"></svg>
    </div>
  </div>
  <div id="side">
    <div id="tabs">
      <div class="tab on" data-t="routes" onclick="showTab('routes')">Routes</div>
      <div class="tab" data-t="classmap" onclick="showTab('classmap')">ClassMap</div>
      <div class="tab" data-t="meta" onclick="showTab('meta')">Meta</div>
    </div>
    <div id="side-body"></div>
  </div>
</div>

<div id="bar">준비</div>

<div id="map-modal">
  <div id="map-modal-box">
    <div class="mm-head">
      맵 관리
      <button style="margin-left:auto;background:none;border:none;color:#888;font-size:14px;cursor:pointer" onclick="closeMapModal()">✕</button>
    </div>
    <div class="mm-bar">
      <button onclick="newMap()">+ 새 맵</button>
      <button onclick="document.getElementById('mi-ini').click()">INI 가져오기</button>
      <input type="file" id="mi-ini" accept=".ini" multiple style="display:none" onchange="importINIFiles(event)">
      <button onclick="document.getElementById('mi').click()">JSON 가져오기</button>
      <input type="file" id="mi" accept=".json" style="display:none" onchange="importJSONBundle(event)">
    </div>
    <div id="mm-list"></div>
    <div class="mm-foot">
      <button onclick="exportAllAsINI()">전체 INI 내보내기</button>
      <button onclick="exportAllAsJSON()">전체 JSON 내보내기</button>
      <button onclick="clearAllMaps()" style="color:#a55">전체 초기화</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let gW = 19, gH = 10, cs = 28;
let grid = [];
let painting = false;
let activeTile = 'PATH';
let curTab = 'routes';
let showRoutes = true;

let meta = { TileWidth: 300, TileHeight: 300, Default: 'BLOCKED' };

let currentMapId   = null;
let currentMapName = '';
let mapDirty       = false;

let classMap = {
  TURRET1: '/Game/01Blueprints/Tile/Tiles/BP_Tile_Turret_Forest_Stone1.BP_Tile_Turret_Forest_Stone1_C',
  TURRET2: '/Game/01Blueprints/Tile/Tiles/BP_Tile_Turret_Forest_Stone1.BP_Tile_Turret_Forest_Stone1_C',
  TURRET3: '/Game/01Blueprints/Tile/Tiles/BP_Tile_Turret_Forest_Stone1.BP_Tile_Turret_Forest_Stone1_C',
  TURRET4: '/Game/01Blueprints/Tile/Tiles/BP_Tile_Turret_Forest_Stone1.BP_Tile_Turret_Forest_Stone1_C',
  PATH:    '/Game/01Blueprints/Tile/Tiles/BP_Tile_Path_Default.BP_Tile_Path_Default_C',
  BLOCKED: '/Game/01Blueprints/Tile/Tiles/BP_Tile_Blocked_Default.BP_Tile_Blocked_Default_C',
  SPAWN:   '/Game/01Blueprints/Tile/Tiles/BP_Tile_EnemySpawner.BP_Tile_EnemySpawner_C',
  RUNE:    '/Game/01Blueprints/Tile/Tiles/BP_Tile_CoreRune.BP_Tile_CoreRune_C',
};

let routes = [];

// Manual drawing state
let manualDraw = null; // { routeIdx, isM, path: [{r,c}...] }
let routeAnim = null;  // { routeIdx, timer, step }

const TILES = ['BLOCKED','PATH','SPAWN','RUNE'];
const BL_LEVELS = ['L1','L2','L3','L4','L5'];
const TC = {
  BLOCKED:'#1c1c1c', PATH:'#7a6540', SPAWN:'#8b2222', RUNE:'#2a228b',
  BLOCKED_L1:'#1a2535', BLOCKED_L1_M:'#1a2535',
  BLOCKED_L2:'#152518', BLOCKED_L2_M:'#152518',
  BLOCKED_L3:'#352015', BLOCKED_L3_M:'#352015',
  BLOCKED_L4:'#28152a', BLOCKED_L4_M:'#28152a',
  BLOCKED_L5:'#153030', BLOCKED_L5_M:'#153030',
};
const RC = ['#ff6b35','#35b5ff','#b5ff35','#ff35b5','#ffff35'];

// ── Cookie persistence ─────────────────────────────────────────────────────
const CK_CM  = 'sow_classmap';
const CK_META = 'sow_meta';

function saveCookie(name, obj) {
  const val = encodeURIComponent(JSON.stringify(obj));
  document.cookie = `${name}=${val};path=/;max-age=31536000`;
}

function loadCookie(name) {
  const m = document.cookie.match(new RegExp(`(?:^|; )${name}=([^;]*)`));
  if (!m) return null;
  try { return JSON.parse(decodeURIComponent(m[1])); } catch { return null; }
}

function saveClassMap() { saveCookie(CK_CM, classMap); }
function saveMeta()     { saveCookie(CK_META, meta); }

// ── Init ───────────────────────────────────────────────────────────────────
function init() {
  const savedCM = loadCookie(CK_CM);
  if (savedCM) Object.assign(classMap, savedCM);
  const savedMeta = loadCookie(CK_META);
  if (savedMeta) Object.assign(meta, savedMeta);

  buildTileBtns();
  buildGrid();
  renderSide();
  updateMapIndicator(false);
}

function makeBtn(id, label, bg, color, onclick) {
  const b = document.createElement('button');
  b.className = 'tile-btn';
  b.id = id;
  b.textContent = label;
  b.style.background = bg;
  b.style.color = color;
  b.onclick = onclick;
  return b;
}

function buildTileBtns() {
  const wrap = document.getElementById('tile-btns');

  // BLOCKED base
  wrap.appendChild(makeBtn('tb-BLOCKED', 'BLOCKED', TC.BLOCKED, '#555', () => setTile('BLOCKED')));

  // L1–L5 sub-buttons
  BL_LEVELS.forEach(l => {
    const t = 'BLOCKED_' + l;
    const b = makeBtn('tb-' + t, l, TC[t], '#99b', () => setTile(t));
    b.classList.add('sm');
    wrap.appendChild(b);
  });

  // M toggle
  const mBtn = makeBtn('tb-M', 'M', '#2a2a2a', '#888', toggleM);
  mBtn.classList.add('sm');
  mBtn.title = '_M 접미사 토글';
  wrap.appendChild(mBtn);

  // separator + other tiles
  const sep = document.createElement('div');
  sep.className = 'sep';
  wrap.appendChild(sep);

  ['PATH','SPAWN','RUNE'].forEach(t => {
    wrap.appendChild(makeBtn('tb-' + t, t, TC[t], '#ddd', () => setTile(t)));
  });

  refreshBtnSel();
}

function setTile(t) {
  // If switching to a BLOCKED_L* tile, preserve current M state
  if (t.startsWith('BLOCKED_L') && !t.endsWith('_M')) {
    const wasM = activeTile.endsWith('_M') && activeTile.startsWith('BLOCKED_L');
    activeTile = wasM ? t + '_M' : t;
  } else {
    activeTile = t;
  }
  refreshBtnSel();
}

function toggleM() {
  if (!activeTile.startsWith('BLOCKED_L')) return;
  activeTile = activeTile.endsWith('_M')
    ? activeTile.slice(0, -2)
    : activeTile + '_M';
  refreshBtnSel();
}

function refreshBtnSel() {
  document.querySelectorAll('.tile-btn').forEach(b => b.classList.remove('sel'));
  if (activeTile.startsWith('BLOCKED_L')) {
    const base = activeTile.endsWith('_M') ? activeTile.slice(0, -2) : activeTile;
    document.getElementById('tb-' + base)?.classList.add('sel');
    if (activeTile.endsWith('_M')) document.getElementById('tb-M')?.classList.add('sel');
  } else {
    document.getElementById('tb-' + activeTile)?.classList.add('sel');
  }
}

// ── Grid ───────────────────────────────────────────────────────────────────
function buildGrid() {
  grid = [];
  for (let r = 0; r < gH; r++) {
    grid[r] = [];
    for (let c = 0; c < gW; c++) grid[r][c] = meta.Default || 'BLOCKED';
  }
  renderGrid();
}

function markApply() {
  document.getElementById('apply-btn').classList.add('dirty');
}

function applySize() {
  document.getElementById('apply-btn').classList.remove('dirty');
  markMapDirty();
  const newCs = parseInt(document.getElementById('ics').value);
  if (newCs && newCs !== cs) setCellSize(newCs);
  const nw = parseInt(document.getElementById('iw').value) || gW;
  const nh = parseInt(document.getElementById('ih').value) || gH;
  const old = grid, ow = gW, oh = gH;
  gW = nw; gH = nh;
  grid = [];
  for (let r = 0; r < gH; r++) {
    grid[r] = [];
    for (let c = 0; c < gW; c++)
      grid[r][c] = (r < oh && c < ow) ? old[r][c] : 'BLOCKED';
  }
  renderGrid();
  setTimeout(drawRoutes, 20);
}

function clearGrid() {
  for (let r = 0; r < gH; r++)
    for (let c = 0; c < gW; c++) grid[r][c] = 'BLOCKED';
  routes = [];
  markMapDirty();
  renderGrid();
  renderSide();
  setTimeout(drawRoutes, 20);
}

function setCellSize(v) {
  if (!v || v < 6) return;
  cs = v;
  const g = document.getElementById('grid');
  g.style.setProperty('--cs', cs + 'px');
  document.querySelectorAll('.cell').forEach(el => {
    if (cs >= 18) { el.classList.add('lbl'); el.dataset.xy = `${el.dataset.c},${el.dataset.r}`; }
    else el.classList.remove('lbl');
  });
  setTimeout(drawRoutes, 20);
}

function cellBaseClass(tile) {
  return tile.startsWith('SPAWN') ? 'SPAWN' : tile;
}

function tileLabel(tile) {
  return tile.startsWith('BLOCKED_') ? 'BLOCKED\n' + tile.slice(8) : tile;
}

function updateCellEl(r, c) {
  const el = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
  if (!el) return;
  const tile = grid[r][c];
  el.className = 'cell ' + cellBaseClass(tile) + (cs >= 18 ? ' lbl' : '');
  el.dataset.tile = tileLabel(tile);
  if (tile.startsWith('SPAWN')) el.dataset.num = tile.replace('SPAWN', '');
  else delete el.dataset.num;
}

function resequenceSpawns() {
  let n = 1;
  for (let r = 0; r < gH; r++)
    for (let c = 0; c < gW; c++)
      if (grid[r][c].startsWith('SPAWN')) {
        grid[r][c] = 'SPAWN' + n++;
        updateCellEl(r, c);
      }
}

function renderGrid() {
  const g = document.getElementById('grid');
  g.style.setProperty('--cs', cs + 'px');
  g.style.gridTemplateColumns = `repeat(${gW}, ${cs}px)`;
  g.innerHTML = '';

  for (let r = 0; r < gH; r++) {
    for (let c = 0; c < gW; c++) {
      const tile = grid[r][c];
      const el = document.createElement('div');
      el.className = 'cell ' + cellBaseClass(tile) + (cs >= 18 ? ' lbl' : '');
      el.dataset.r = r; el.dataset.c = c;
      el.dataset.tile = tileLabel(tile);
      if (cs >= 18) el.dataset.xy = `${c},${r}`;
      if (tile.startsWith('SPAWN')) el.dataset.num = tile.replace('SPAWN', '');
      el.addEventListener('mousedown', onDown);
      el.addEventListener('mouseover', onOver);
      g.appendChild(el);
    }
  }

  setTimeout(() => {
    const g2 = document.getElementById('grid');
    const svg = document.getElementById('route-svg');
    svg.style.width = g2.offsetWidth + 'px';
    svg.style.height = g2.offsetHeight + 'px';
    svg.setAttribute('width', g2.offsetWidth);
    svg.setAttribute('height', g2.offsetHeight);
    drawRoutes();
  }, 20);
}

function paint(r, c) {
  if (r < 0 || r >= gH || c < 0 || c >= gW) return;
  markMapDirty();
  const prev = grid[r][c];
  if (activeTile === 'SPAWN') {
    if (prev.startsWith('SPAWN')) return;
    grid[r][c] = 'SPAWN_NEW';
    resequenceSpawns();
  } else {
    grid[r][c] = activeTile;
    updateCellEl(r, c);
    if (prev.startsWith('SPAWN')) resequenceSpawns();
  }
}

document.addEventListener('mouseup', () => { painting = false; });

// ── Routes SVG ─────────────────────────────────────────────────────────────
function parseRoute(s) {
  return [...s.matchAll(/\((\d+),(\d+)\)/g)].map(m => ({ c: +m[1], r: +m[2] }));
}

function drawRoutes() {
  const svg = document.getElementById('route-svg');
  svg.innerHTML = '';
  if (!showRoutes) return;

  const step = cs + 1, half = cs / 2;

  routes.forEach((route, ri) => {
    const pts = parseRoute(route.path);
    if (pts.length < 2) return;
    const isM = route.name.endsWith('_M');
    const routeNum = (route.name.match(/(\d+)/) || [,0])[1] - 1;
    const col = RC[routeNum % RC.length];

    const pl = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    pl.setAttribute('points', pts.map(p => `${p.c * step + half},${p.r * step + half}`).join(' '));
    pl.setAttribute('stroke', col);
    pl.setAttribute('stroke-width', isM ? '1.5' : '3');
    pl.setAttribute('fill', 'none');
    pl.setAttribute('opacity', isM ? '0.5' : '0.85');
    pl.setAttribute('stroke-linejoin', 'round');
    if (isM) pl.setAttribute('stroke-dasharray', '4 3');
    svg.appendChild(pl);

    // start circle
    const sc = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    sc.setAttribute('cx', pts[0].c * step + half);
    sc.setAttribute('cy', pts[0].r * step + half);
    sc.setAttribute('r', '5');
    sc.setAttribute('fill', col);
    svg.appendChild(sc);

    // end circle
    const ec = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    const ep = pts[pts.length - 1];
    ec.setAttribute('cx', ep.c * step + half);
    ec.setAttribute('cy', ep.r * step + half);
    ec.setAttribute('r', '4');
    ec.setAttribute('fill', '#fff');
    ec.setAttribute('stroke', col);
    ec.setAttribute('stroke-width', '2');
    svg.appendChild(ec);

    // route number label at start
    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    txt.setAttribute('x', pts[0].c * step + half);
    txt.setAttribute('y', pts[0].r * step + half + 4);
    txt.setAttribute('text-anchor', 'middle');
    txt.setAttribute('font-size', '8');
    txt.setAttribute('fill', '#fff');
    txt.setAttribute('font-family', 'monospace');
    txt.textContent = ri + 1;
    svg.appendChild(txt);
  });
}

// ── Side Panel ─────────────────────────────────────────────────────────────
function showTab(t) {

function renderSide() {

function renderRoutes(el) {

  routes.forEach((route, i) => {
    const div = document.createElement('div');
    div.className = 'route-item';

    nameInp.onchange = function() { routes[+this.dataset.idx].name = this.value; drawRoutes(); };

    const lockBtn = document.createElement('button');
    lockBtn.className = 'route-btn' + (route.locked ? ' locked' : '');
    lockBtn.textContent = route.locked ? '🔒' : '🔓';
    lockBtn.title = route.locked ? '잠금 해제' : '잠금';
    lockBtn.onclick = () => { route.locked = !route.locked; renderSide(); };

    const drawBtn = document.createElement('button');
    drawBtn.className = 'route-btn' + (manualDraw && manualDraw.routeIdx === i ? ' drawing' : '');
    drawBtn.textContent = '✏️';
    drawBtn.title = '수동 입력';
    drawBtn.onclick = () => startManualDraw(i);

    const playBtn = document.createElement('button');
    playBtn.className = 'route-btn' + (routeAnim && routeAnim.routeIdx === i ? ' playing' : '');
    playBtn.textContent = routeAnim && routeAnim.routeIdx === i ? '⏹' : '▶';
    playBtn.title = '경로 재생';
    playBtn.onclick = () => toggleRoutePlay(i);

    const rm = document.createElement('button');
    rm.textContent = '✕';
    rm.style.cssText = 'margin-left:auto;font-size:9px;padding:1px 4px;';
    rm.onclick = () => { stopRoutePlay(); if (manualDraw && manualDraw.routeIdx === i) cancelManualDraw(); routes.splice(i, 1); drawRoutes(); renderSide(); };
    head.appendChild(dot);
    head.appendChild(nameInp);
    head.appendChild(lockBtn);
    head.appendChild(drawBtn);
    head.appendChild(playBtn);
    head.appendChild(rm);
    div.appendChild(head);

    ta.value = route.path;
    ta.dataset.idx = i;

    div.appendChild(ta);

function renderClassMap(el) {
  el.innerHTML = '';
  Object.keys(classMap).forEach(k => {

function renderMeta(el) {
  el.innerHTML = '';

  const metaLabels = { TileWidth: '타일 너비', TileHeight: '타일 높이' };
  [['TileWidth','number'],['TileHeight','number']].forEach(([k, type]) => {
    const row = document.createElement('div');
    row.className = 'meta-row';
    row.innerHTML = `<label>${metaLabels[k]}</label><input type="${type}" value="${meta[k]}" data-k="${k}">`;
    row.querySelector('input').onchange = function() {
      meta[this.dataset.k] = type === 'number' ? +this.value : this.value;
      saveMeta();
    };
    el.appendChild(row);
  });

  const row = document.createElement('div');
  row.className = 'meta-row';
  row.innerHTML = `<label>기본값</label>
    <select data-k="Default">
      ${TILES.map(t => `<option value="${t}"${meta.Default===t?' selected':''}>${t}</option>`).join('')}
    </select>`;
  row.querySelector('select').onchange = function() { meta.Default = this.value; saveMeta(); };
  el.appendChild(row);
}

// ── Export ─────────────────────────────────────────────────────────────────
function buildINIText() {
  const lines = [];
  lines.push('[Meta]');
  lines.push(`GridWidth=${gW}`);
  lines.push(`GridHeight=${gH}`);
  lines.push(`TileWidth=${meta.TileWidth}`);
  lines.push(`TileHeight=${meta.TileHeight}`);
  lines.push(`Default=${meta.Default}`);
  lines.push('');

  const spawnKeys = [];
  for (let r = 0; r < gH; r++)
    for (let c = 0; c < gW; c++)
      if (grid[r][c].startsWith('SPAWN') && !spawnKeys.includes(grid[r][c]))
        spawnKeys.push(grid[r][c]);
  spawnKeys.sort((a, b) => +a.replace('SPAWN','') - +b.replace('SPAWN',''));

  lines.push('[ClassMap]');
  Object.entries(classMap).forEach(([k, v]) => {
    if (k === 'SPAWN') spawnKeys.forEach(sk => lines.push(`${sk} = ${v}`));
    else lines.push(`${k} = ${v}`);
  });
  lines.push('');

  lines.push('[Grid]');
  for (let r = 0; r < gH; r++) lines.push(`Row${r}= ${grid[r].join(', ')}`);
  lines.push('');

  const validRoutes = routes.filter(r => r.path.trim());
  if (validRoutes.length) {
    lines.push('[EnemyRoutes]');
    validRoutes.forEach(r => lines.push(`${r.name}=${r.path}`));
    lines.push('');
  }
  return lines.join('\n');
}

function exportINI() {
  const name = currentMapName || 'Stage';
  download(buildINIText(), `${name}.ini`, 'text/plain;charset=utf-8');
  status(`${name}.ini 내보내기 완료`);
}

function download(content, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: mime }));
  a.download = filename;
  a.click();
}

// ── Map Manager ────────────────────────────────────────────────────────────
function loadMaps() {
  try { return JSON.parse(localStorage.getItem('sow_maps') || '[]'); }
  catch { return []; }
}
function saveMaps(maps) { localStorage.setItem('sow_maps', JSON.stringify(maps)); }

function serializeCurrentMap() {
  return {
    id: currentMapId || Date.now(),
    name: currentMapName || '제목없음',
    savedAt: new Date().toISOString(),
    gW, gH,
    meta: { ...meta },
    classMap: { ...classMap },
    grid: grid.map(row => [...row]),
    routes: routes.map(r => ({ name: r.name, path: r.path, locked: !!r.locked }))
  };
}

function applyMapData(m) {
  gW = m.gW; gH = m.gH;
  meta     = { ...m.meta };
  classMap = { ...m.classMap };
  grid     = m.grid.map(row => [...row]);
  routes   = (m.routes || []).map(r => ({ name: r.name, path: r.path, locked: !!r.locked }));
  currentMapId   = m.id;
  currentMapName = m.name;
  document.getElementById('iw').value = gW;
  document.getElementById('ih').value = gH;
}

function updateMapIndicator(dirty) {
  mapDirty = dirty;
  const el = document.getElementById('map-indicator');
  if (document.activeElement !== el)
    el.value = currentMapName || '제목없음';
  el.classList.toggle('dirty', dirty);
}

function renameCurrentMap(name) {
  currentMapName = name.trim() || '제목없음';
  document.getElementById('map-indicator').value = currentMapName;
  markMapDirty();
  if (currentMapId) {
    const all = loadMaps(), idx = all.findIndex(x => x.id === currentMapId);
    if (idx >= 0) { all[idx].name = currentMapName; saveMaps(all); }
  }
}

function markMapDirty() { if (!mapDirty) updateMapIndicator(true); }

function openMapModal()  { renderMapList(); document.getElementById('map-modal').classList.add('open'); }
function closeMapModal() { document.getElementById('map-modal').classList.remove('open'); }

function newMap() {
  const n = prompt('새 맵 이름:', '제목없음');
  if (n === null) return;
  currentMapId   = null;
  currentMapName = n.trim() || '제목없음';
  gW = 19; gH = 10;
  document.getElementById('iw').value = gW;
  document.getElementById('ih').value = gH;
  for (let r = 0; r < gH; r++) { grid[r] = []; for (let c = 0; c < gW; c++) grid[r][c] = 'BLOCKED'; }
  routes = [];
  renderGrid();
  renderSide();
  updateMapIndicator(true);
  closeMapModal();

function renderMapList() {
  const maps = loadMaps();
  const el = document.getElementById('mm-list');
  el.innerHTML = '';
  if (!maps.length) {
    el.innerHTML = '<div class="mm-empty">저장된 맵 없음</div>';
    return;
  }
  [...maps].reverse().forEach(m => {
    const row = document.createElement('div');
    row.className = 'mm-row' + (m.id === currentMapId ? ' cur' : '');

    const mark = document.createElement('span');
    mark.className = 'mm-mark';
    mark.textContent = m.id === currentMapId ? '▶' : '';

    const nameInp = document.createElement('input');
    nameInp.className = 'mm-name';
    nameInp.value = m.name;
    nameInp.onchange = function() {
      const all = loadMaps(), idx = all.findIndex(x => x.id === m.id);
      if (idx >= 0) { all[idx].name = this.value; saveMaps(all); }
      if (m.id === currentMapId) { currentMapName = this.value; updateMapIndicator(mapDirty); }
    };

    const info = document.createElement('span');
    info.className = 'mm-info';
    info.textContent = `${m.gW}×${m.gH}`;

    const date = document.createElement('span');
    date.className = 'mm-date';
    const d = new Date(m.savedAt);
    date.textContent = m.savedAt
      ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`
      : '';

    const acts = document.createElement('div');
    acts.className = 'mm-acts';

    const loadBtn = document.createElement('button');
    loadBtn.textContent = '불러오기';
    loadBtn.onclick = () => { loadMapById(m.id); closeMapModal(); };

    const iniBtn = document.createElement('button');
    iniBtn.textContent = 'INI';
    iniBtn.onclick = () => exportMapAsINI(m.id);

    const delBtn = document.createElement('button');
    delBtn.textContent = '✕';
    delBtn.style.color = '#a55';
    delBtn.onclick = () => {
      if (!confirm(`"${m.name}" 삭제?`)) return;
      const all = loadMaps().filter(x => x.id !== m.id);
      saveMaps(all);
      if (currentMapId === m.id) { currentMapId = null; updateMapIndicator(true); }
      renderMapList();
    };

    acts.append(loadBtn, iniBtn, delBtn);
    row.append(mark, nameInp, info, date, acts);
    el.appendChild(row);
  });

function saveCurrentMap() {
  if (!currentMapName) {
    const n = prompt('맵 이름:', '제목없음');
    if (n === null) return;
    currentMapName = n.trim() || '제목없음';
  }
  const all = loadMaps();
  const m   = serializeCurrentMap();
  const idx = all.findIndex(x => x.id === m.id);
  if (idx >= 0) all[idx] = m; else all.push(m);
  currentMapId = m.id;
  saveMaps(all);
  updateMapIndicator(false);
  renderMapList();
  status(`저장: ${m.name}`);
}

function loadMapById(id) {
  const m = loadMaps().find(x => x.id === id);
  if (!m) return;
  applyMapData(m);
  renderGrid();
  renderSide();
  updateMapIndicator(false);
  status(`로드: ${m.name} (${m.gW}×${m.gH})`);
}

function exportMapAsINI(id) {
  const m = loadMaps().find(x => x.id === id);
  if (!m) return;
  // swap only the INI-relevant state, never touching currentMapId/Name
  const [sg, sW, sH, sm, scm, sr] = [grid, gW, gH, meta, classMap, routes];
  gW = m.gW; gH = m.gH; meta = m.meta; classMap = m.classMap;
  grid = m.grid; routes = m.routes || [];
  const text = buildINIText();
  gW = sW; gH = sH; meta = sm; classMap = scm; grid = sg; routes = sr;
  download(text, `${m.name}.ini`, 'text/plain;charset=utf-8');
  status(`INI 내보내기: ${m.name}`);
}

function exportAllAsINI() {
  const maps = loadMaps();
  if (!maps.length) { status('저장된 맵 없음'); return; }
  const [sg, sW, sH, sm, scm, sr] = [grid, gW, gH, meta, classMap, routes];
  maps.forEach((m, i) => {
    setTimeout(() => {
      gW = m.gW; gH = m.gH; meta = m.meta; classMap = m.classMap;
      grid = m.grid; routes = m.routes || [];
      download(buildINIText(), `${m.name}.ini`, 'text/plain;charset=utf-8');
      if (i === maps.length - 1) {
        gW = sW; gH = sH; meta = sm; classMap = scm; grid = sg; routes = sr;
        status(`INI 일괄 내보내기: ${maps.length}개`);
      }
    }, i * 150);
  });
}

function exportAllAsJSON() {
  const maps = loadMaps();
  download(JSON.stringify(maps, null, 2), 'sow_maps.json', 'application/json');
  status(`JSON 내보내기: ${maps.length}개 맵`);
}

function clearAllMaps() {
  const maps = loadMaps();
  if (!maps.length) { status('저장된 맵 없음'); return; }
  if (!confirm(`저장된 맵 ${maps.length}개를 모두 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;
  localStorage.removeItem('sow_maps');
  currentMapId = null;
  updateMapIndicator(true);
  renderMapList();
  status('전체 맵 초기화 완료');
}

function importINIFiles(e) {
  const files = [...e.target.files];
  if (!files.length) return;
  const all = loadMaps();
  let done = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const [sg, sW, sH, sm, scm, sr, sid, sname] = [grid, gW, gH, meta, classMap, routes, currentMapId, currentMapName];
      parseINI(ev.target.result, file.name);
      const m = { ...serializeCurrentMap(), id: Date.now() + Math.floor(Math.random() * 1e6) };
      all.push(m);
      grid = sg; gW = sW; gH = sH; meta = sm; classMap = scm; routes = sr;
      currentMapId = sid; currentMapName = sname;
      if (++done === files.length) {
        saveMaps(all);
        renderMapList();
        renderGrid(); renderSide(); updateMapIndicator(mapDirty);
        e.target.value = '';
        status(`INI 가져오기: ${files.length}개 맵 추가`);
      }
    };
    reader.readAsText(file);
  });
}

function importJSONBundle(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const incoming = JSON.parse(ev.target.result);
      if (!Array.isArray(incoming)) throw new Error('invalid');
      const existing  = loadMaps();
      const existIds  = new Set(existing.map(x => x.id));
      incoming.forEach(m => {
        if (existIds.has(m.id)) m.id = Date.now() + Math.floor(Math.random() * 1e6);
        existing.push(m);
      });
      saveMaps(existing);
      renderMapList();
      status(`가져오기: ${incoming.length}개 맵 추가`);
    } catch { status('JSON 형식 오류'); }
    e.target.value = '';
  };
  reader.readAsText(file);
}

// ── Load ───────────────────────────────────────────────────────────────────
function loadINI(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => { parseINI(ev.target.result, file.name); e.target.value = ''; };
  reader.readAsText(file);
}

function parseINI(text, fname) {
  const lines = text.split(/\r?\n/);
  let sec = '';
  const ng = [], nr = [];
  const ncm = {}, nm = { TileWidth: 300, TileHeight: 300, Default: 'BLOCKED' };
  let nw = 0, nh = 0;

  for (const raw of lines) {
    const line = raw.trim();
    if (!line) continue;
    if (line.startsWith('[') && line.endsWith(']')) { sec = line.slice(1,-1); continue; }
    const eq = line.indexOf('=');
    if (eq < 0) continue;
    const k = line.slice(0, eq).trim();
    const v = line.slice(eq + 1).trim();

    if (sec === 'Meta') {
      if (k === 'GridWidth') nw = +v;
      else if (k === 'GridHeight') nh = +v;
      else if (k === 'TileWidth') nm.TileWidth = +v;
      else if (k === 'TileHeight') nm.TileHeight = +v;
      else if (k === 'Default') nm.Default = v;
    } else if (sec === 'ClassMap') {
      ncm[k.startsWith('SPAWN') ? 'SPAWN' : k] = v;
    } else if (sec === 'Grid') {
      ng.push(v.split(',').map(s => s.trim()));
    } else if (sec === 'EnemyRoutes') {
      nr.push({ name: k, path: v });
    }
  }

  gH = nh || ng.length || gH;
  gW = nw || ng[0]?.length || gW;
  grid = [];
  for (let r = 0; r < gH; r++) {
    grid[r] = [];
    for (let c = 0; c < gW; c++)
      grid[r][c] = ng[r]?.[c] || 'BLOCKED';
  }
  routes = nr;
  sortRoutes();
  if (Object.keys(ncm).length) Object.assign(classMap, ncm);
  Object.assign(meta, nm);

  document.getElementById('iw').value = gW;
  document.getElementById('ih').value = gH;
  currentMapId   = null;
  currentMapName = fname.replace(/\.ini$/i, '');
  renderGrid();
  renderSide();
  updateMapIndicator(true);
  status(`불러옴: ${fname} (${gW}×${gH})`);
}

function sortRoutes() {
  routes.sort((a, b) => {
    const numA = +(a.name.match(/(\d+)/) || [,0])[1];
    const numB = +(b.name.match(/(\d+)/) || [,0])[1];
    if (numA !== numB) return numA - numB;
    const mA = a.name.endsWith('_M') ? 1 : 0;
    const mB = b.name.endsWith('_M') ? 1 : 0;
    return mA - mB;
  });
}

// ── Auto Route Generation ──────────────────────────────────────────────────
function autoGenerateRoutes() {
  const spawns = [], runes = [];
  for (let r = 0; r < gH; r++)
    for (let c = 0; c < gW; c++) {
      if (grid[r][c].startsWith('SPAWN')) spawns.push({r, c});
      if (grid[r][c] === 'RUNE') runes.push({r, c});
    }

  if (!spawns.length) { status('Auto-route: SPAWN 타일 없음'); return; }
  if (!runes.length)  { status('Auto-route: RUNE 타일 없음');  return; }

  // Preserve locked routes
  const lockedRoutes = routes.filter(r => r.locked);
  const lockedNames = new Set(lockedRoutes.map(r => r.name));

  const newRoutes = [];
  spawns.forEach((spawn, i) => {
    const n = i + 1;
    if (!lockedNames.has(`Route${n}`)) {
      const path = bfs(spawn, runes, false);
      if (path) newRoutes.push({ name: `Route${n}`, path: path.map(p => `(${p.c},${p.r})`).join('->') });
    }
    if (!lockedNames.has(`Route${n}_M`)) {
      const pathM = bfs(spawn, runes, true);
      if (pathM) newRoutes.push({ name: `Route${n}_M`, path: pathM.map(p => `(${p.c},${p.r})`).join('->') });
    }
  });

  routes = [...lockedRoutes, ...newRoutes];
  sortRoutes();
  markMapDirty();
  renderSide();
  drawRoutes();
  if (newRoutes.length) status(`Auto-route: ${newRoutes.length}개 경로 생성`);
}

function bfs(start, targets, includeM) {
  const targetSet = new Set(targets.map(t => `${t.r},${t.c}`));
  const isWalkable = t => t.startsWith('SPAWN') || t === 'PATH' || t === 'RUNE' || (includeM && t.endsWith('_M'));

  // Heuristic: min Manhattan distance to any target
  const h = (r, c) => {
    let min = Infinity;
    for (const t of targets) { const d = Math.abs(r - t.r) + Math.abs(c - t.c); if (d < min) min = d; }
    return min;
  };

  const startKey = `${start.r},${start.c}`;
  const gScore = new Map([[startKey, 0]]);
  const cameFrom = new Map();
  // Open set as sorted array (small grids, simple is fine)
  const open = [{ r: start.r, c: start.c, f: h(start.r, start.c) }];
  const closed = new Set();

  while (open.length) {
    // Pick node with lowest f
    let bestIdx = 0;
    for (let i = 1; i < open.length; i++) if (open[i].f < open[bestIdx].f) bestIdx = i;
    const cur = open.splice(bestIdx, 1)[0];
    const curKey = `${cur.r},${cur.c}`;

    if (targetSet.has(curKey)) {
      // Reconstruct path
      const path = [{ r: cur.r, c: cur.c }];
      let k = curKey;
      while (cameFrom.has(k)) { k = cameFrom.get(k); const [pr, pc] = k.split(',').map(Number); path.unshift({ r: pr, c: pc }); }
      return path;
    }

    closed.add(curKey);
    const curG = gScore.get(curKey);

    for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr = cur.r + dr, nc = cur.c + dc;
      const nKey = `${nr},${nc}`;
      if (nr < 0 || nr >= gH || nc < 0 || nc >= gW) continue;
      if (closed.has(nKey)) continue;
      if (!isWalkable(grid[nr][nc])) continue;
      const tentG = curG + 1;
      if (tentG < (gScore.get(nKey) ?? Infinity)) {
        gScore.set(nKey, tentG);
        cameFrom.set(nKey, curKey);
        const f = tentG + h(nr, nc);
        const existing = open.find(o => o.r === nr && o.c === nc);
        if (existing) existing.f = f;
        else open.push({ r: nr, c: nc, f });
      }
    }
  }
  return null;
}

// ── Manual Route Drawing ──────────────────────────────────────────────────
function startManualDraw(routeIdx) {
  // If already drawing this route, cancel
  if (manualDraw && manualDraw.routeIdx === routeIdx) { cancelManualDraw(); return; }
  // Cancel any existing draw
  if (manualDraw) cancelManualDraw();

  const route = routes[routeIdx];
  const isM = route.name.endsWith('_M');

  // Find the spawn point for this route
  const routeNum = (route.name.match(/(\d+)/) || [,0])[1];
  const spawnTile = 'SPAWN' + routeNum;
  let startCell = null;
  for (let r = 0; r < gH && !startCell; r++)
    for (let c = 0; c < gW && !startCell; c++)
      if (grid[r][c] === spawnTile) startCell = { r, c };

  if (!startCell) { status(`수동 입력: ${spawnTile} 타일을 찾을 수 없음`); return; }

  manualDraw = { routeIdx, isM, path: [startCell] };
  highlightManualPath();
  renderSide();
  status(`수동 입력: ${spawnTile}에서 시작 — 인접한 타일을 클릭하여 경로 지정 (ESC: 취소, 백스페이스: 되돌리기)`);
}

function cancelManualDraw() {
  manualDraw = null;
  clearDrawHighlights();
  renderSide();
  status('수동 입력 취소');
}

function finishManualDraw() {
  if (!manualDraw) return;
  const route = routes[manualDraw.routeIdx];
  route.path = manualDraw.path.map(p => `(${p.c},${p.r})`).join('->');
  manualDraw = null;
  clearDrawHighlights();
  markMapDirty();
  drawRoutes();
  renderSide();
  status('수동 입력 완료');
}

function isManualWalkable(r, c) {
  if (r < 0 || r >= gH || c < 0 || c >= gW) return false;
  const t = grid[r][c];
  if (t.startsWith('SPAWN') || t === 'PATH' || t === 'RUNE') return true;
  if (manualDraw && manualDraw.isM && t.endsWith('_M')) return true;
  return false;
}

function isAdjacent(a, b) {
  return Math.abs(a.r - b.r) + Math.abs(a.c - b.c) === 1;
}

function onManualClick(r, c) {
  if (!manualDraw) return false;
  const last = manualDraw.path[manualDraw.path.length - 1];

  // Must be adjacent to last cell
  if (!isAdjacent(last, { r, c })) return false;
  // Must be walkable
  if (!isManualWalkable(r, c)) return false;
  // No consecutive duplicate (same as last)
  if (last.r === r && last.c === c) return false;

  manualDraw.path.push({ r, c });
  highlightManualPath();
  drawRoutes();

  // Check if reached RUNE
  if (grid[r][c] === 'RUNE') {
    finishManualDraw();
  }
  return true;
}

function undoManualStep() {
  if (!manualDraw || manualDraw.path.length <= 1) return;
  manualDraw.path.pop();
  highlightManualPath();
  drawRoutes();
}

function highlightManualPath() {
  clearDrawHighlights();
  if (!manualDraw) return;
  manualDraw.path.forEach((p, i) => {
    const el = document.querySelector(`.cell[data-r="${p.r}"][data-c="${p.c}"]`);
    if (el) el.classList.add(i === 0 ? 'draw-start' : 'draw-highlight');
  });

  // Also temporarily update route path for live preview
  const route = routes[manualDraw.routeIdx];
  if (route) route.path = manualDraw.path.map(p => `(${p.c},${p.r})`).join('->');
}

function clearDrawHighlights() {
  document.querySelectorAll('.draw-highlight, .draw-start').forEach(el => {
    el.classList.remove('draw-highlight', 'draw-start');
  });
}

// Override grid mouse events for manual drawing
function onDown(e) {
  if (e.button !== 0) return;
  const r = +e.currentTarget.dataset.r, c = +e.currentTarget.dataset.c;
  if (manualDraw) {
    onManualClick(r, c);
    e.preventDefault();
    return;
  }
  painting = true;
  paint(r, c);
  e.preventDefault();
}
function onOver(e) {
  if (manualDraw) {
    // Support drag drawing in manual mode
    if (e.buttons === 1) {
      const r = +e.currentTarget.dataset.r, c = +e.currentTarget.dataset.c;
      onManualClick(r, c);
    }
    return;
  }
  if (!painting) return;
  paint(+e.currentTarget.dataset.r, +e.currentTarget.dataset.c);
}

// Keyboard shortcuts for manual drawing
document.addEventListener('keydown', e => {
  if (!manualDraw) return;
  if (e.key === 'Escape') { cancelManualDraw(); e.preventDefault(); }
  if (e.key === 'Backspace') { undoManualStep(); e.preventDefault(); }
});

// ── Route Playback ────────────────────────────────────────────────────────
function toggleRoutePlay(idx) {
  if (routeAnim && routeAnim.routeIdx === idx) { stopRoutePlay(); return; }
  stopRoutePlay();
  const route = routes[idx];
  if (!route) return;
  const pts = parseRoute(route.path);
  if (pts.length < 2) { status('재생: 경로가 비어있음'); return; }

  routeAnim = { routeIdx: idx, timer: null, step: 0, pts };
  renderSide();
  animStep();
}

function animStep() {
  if (!routeAnim) return;
  const { pts, step } = routeAnim;

  clearAnimHighlights();

  // Trail: all visited cells
  for (let i = 0; i < step; i++) {
    const el = document.querySelector(`.cell[data-r="${pts[i].r}"][data-c="${pts[i].c}"]`);
    if (el) el.classList.add('anim-trail');
  }
  // Head: current cell
  const cur = pts[step];
  const headEl = document.querySelector(`.cell[data-r="${cur.r}"][data-c="${cur.c}"]`);
  if (headEl) headEl.classList.add('anim-head');

  if (step >= pts.length - 1) {
    // Reached end — hold briefly then stop
    routeAnim.timer = setTimeout(() => { stopRoutePlay(); }, 500);
    return;
  }

  routeAnim.step++;
  routeAnim.timer = setTimeout(animStep, 120);
}

function stopRoutePlay() {
  if (!routeAnim) return;
  clearTimeout(routeAnim.timer);
  routeAnim = null;
  clearAnimHighlights();
  renderSide();
  status('준비');
}

function clearAnimHighlights() {
  document.querySelectorAll('.anim-trail, .anim-head').forEach(el => {
    el.classList.remove('anim-trail', 'anim-head');
  });
}

function status(msg) { document.getElementById('bar').textContent = msg; }

// ── Go ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
